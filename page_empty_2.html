<!doctype html>
<html>
	<head>
		<meta charset = "utf-8">
		<meta http-equiv = "X-UA-Compatible" content = "chrome=1">
		<meta name = "viewport" content = "width = device-width, initial-scale = 1, maximum-scale = 1, user-scalable = no">
		<link rel = "stylesheet" href = "bootstrap/bootstrap.min.css"/>
		<link rel = "stylesheet" href = "css/mainStyle.css">
		<link rel = "stylesheet" href = "css/github-dark.css">
		<link rel = "stylesheet" href = "css/scrolltoTopBtn.css">
		<link rel = "stylesheet" href = "css/nanogallery2.min.css">
		<title> photo gallery </title>
	</head>
	<body>
		<div class = "header cbp-af-header">
			<nav>
				<li class = "topTab"> <a href = "index.html"> home </a> </li>
				<li class = "topTab"> <a href = "page_about.html"> about </a> </li>
			</nav>
		</div>
		<div class = "galleryWrapper">
			<!-- Carousel Image Cycler -->
			<section class = "gallerySection">
				<h1> <center> ポチタのgallery </center> </h1> 
				<hr>
				<div id = "carousel" class = "carousel slide" data-ride = "carousel">
					<ol class = "carousel-indicators">
					  <li data-target = "#carousel" data-slide-to="0" class="active"></li>
					  <li data-target = "#carousel" data-slide-to="1"></li>
					  <li data-target = "#carousel" data-slide-to="2"></li>
					  <li data-target = "#carousel" data-slide-to="3"></li>
					</ol>

					<div class = "carousel-inner">
					  <div class = "carousel-item active">
						<img class = "d-block w-100" src = "gallery/kirby (1).jpg" alt = "Photo 1">
					  </div>
					  <div class = "carousel-item">
						<img class = "d-block w-100" src = "gallery/kirby (2).jpg" alt = "Photo 2">
					  </div>
					  <div class = "carousel-item">
						<img class = "d-block w-100" src = "gallery/kirby (3).jpg" alt = "Photo 2">
					  </div>
					  <div class = "carousel-item">
						<img class = "d-block w-100" src = "gallery/kirby (4).jpg" alt = "Photo 2">
					  </div>
					</div>
					<a class = "carousel-control-prev" href = "#carousel" role = "button" data-slide = "prev">
					  <span class="carousel-control-prev-icon" aria-hidden = "true"></span>
					  <span class="sr-only"> 前 </span>
					</a>
					<a class = "carousel-control-next" href = "#carousel" role = "button" data-slide = "next">
					  <span class="carousel-control-next-icon" aria-hidden = "true"></span>
					  <span class = "sr-only"> 次 </span>
					</a>
				  </div>
			</section>
			<!-- nanoGallery2 -->
			<section class = "gallerySection">
				<h1> <center> header title </center> </h1>
				<hr>
				<div id = "nanogallery2"
					data-nanogallery2 = '{
							"thumbnailHeight":  200,
							"thumbnailWidth":   200,
							"itemsBaseURL":     "gallery/"
						}' >
					<a href = "photo.jpg"   data-ngThumb = "photo.jpg" > </a>

				</div>
			</section>
		</div>
		<button class = "scrollToTopBtn showBtn" type = "button">
			<img src = "images/arrowUp.svg" border = "0" width = 16em height = 16em>
		</button>
		<script src = "javascripts/hnkFunctions.js"> </script>
		<script src = "javascripts/respond.js"> </script>
		<script src = "javascripts/jquery-1.9.0.min.js"> </script>
		<script src = "javascripts/classie.js"> </script>
		<script src = "javascripts/cbpAnimatedHeader.js"> </script>
		<script src = "bootstrap/bootstrap.min.js"> </script>
		<script src = "javascripts/jquery.nanogallery2.min.js"> </script>
	</body>
</html>
